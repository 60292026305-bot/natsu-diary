<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>夏休みの一言日記</title>
  <style>
    /* ===== ベース ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
      background: #5bbde4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 10px 60px;
      position: relative;
      overflow-x: hidden;
    }

    /* ===== 背景SVGイラスト ===== */
    #bg-scene {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    body > *:not(#bg-scene) {
      position: relative;
      z-index: 1;
    }

    h1.app-title {
      font-size: 2rem;
      color: #fff;
      text-shadow: 2px 3px 8px rgba(0,80,130,0.55), 0 1px 0 rgba(0,0,0,0.15);
      margin-bottom: 24px;
      letter-spacing: 0.05em;
    }

    /* ===== 入力フォーム（ノート風） ===== */
    .form-book {
      width: 100%;
      max-width: 560px;
      background: #fffdf5;
      border-radius: 4px 16px 16px 4px;
      box-shadow:
        -6px 0 0 #d4a373,
        0 6px 24px rgba(0,0,0,0.25),
        inset 0 0 60px rgba(0,0,0,0.03);
      padding: 32px 28px 28px 36px;
      position: relative;
      border-left: 10px solid #c97e3a;
    }

    /* ノートの横罫線 */
    .form-book::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background-image: repeating-linear-gradient(
        transparent,
        transparent 31px,
        #d0eaf5 31px,
        #d0eaf5 32px
      );
      pointer-events: none;
      opacity: 0.5;
    }

    .form-book > * { position: relative; }

    .form-book h2 {
      color: #c97e3a;
      font-size: 1.1rem;
      margin-bottom: 20px;
      border-bottom: 2px dashed #f0c080;
      padding-bottom: 8px;
    }

    .form-group { margin-bottom: 16px; }

    .form-group label {
      display: block;
      font-weight: bold;
      font-size: 0.85rem;
      color: #555;
      margin-bottom: 6px;
    }

    input[type="date"], input[type="text"], textarea {
      width: 100%;
      padding: 9px 12px;
      border: 1.5px solid #b2d8ea;
      border-radius: 8px;
      background: rgba(255,255,255,0.7);
      font-size: 15px;
      font-family: inherit;
      color: #333;
    }

    textarea { resize: vertical; }

    /* ===== 気分セレクター ===== */
    .mood-selector {
      display: flex;
      justify-content: space-around;
      margin-top: 4px;
    }

    .mood-box { display: none; }

    .mood-label {
      font-size: 28px;
      cursor: pointer;
      padding: 8px 10px;
      border-radius: 50%;
      transition: background 0.2s, transform 0.15s;
      user-select: none;
    }

    .mood-label:hover { transform: scale(1.2); }

    .mood-box:checked + .mood-label {
      background-color: #ffcc80;
      box-shadow: 0 2px 8px rgba(200,120,0,0.35);
    }

    /* ===== 写真アップロード ===== */
    .photo-upload-area {
      border: 2px dashed #90caf9;
      border-radius: 12px;
      background: rgba(227,242,253,0.5);
      padding: 14px;
      text-align: center;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      position: relative;
    }

    .photo-upload-area:hover, .photo-upload-area.drag-over {
      background: rgba(179,229,252,0.6);
      border-color: #42a5f5;
    }

    .photo-upload-area input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .photo-upload-hint {
      font-size: 13px;
      color: #5a8fa8;
      pointer-events: none;
    }

    .photo-preview-wrap {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .photo-preview-wrap img {
      width: 72px;
      height: 72px;
      object-fit: cover;
      border-radius: 6px;
      border: 2px solid #fff;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }

    .photo-remove-btn {
      position: absolute;
      top: -6px;
      right: -6px;
      background: #ef5350;
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 18px;
      height: 18px;
      font-size: 11px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .photo-thumb-wrap {
      position: relative;
      display: inline-block;
    }

    /* ===== 保存ボタン ===== */
    .save-btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #00acc1, #007c91);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(0,140,170,0.4);
      transition: opacity 0.2s, transform 0.15s;
      margin-top: 6px;
    }

    .save-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .save-btn:active { transform: translateY(1px); }

    /* ===== スクラップブック（アルバム）エリア ===== */
    .album-section {
      width: 100%;
      max-width: 560px;
      margin-top: 36px;
    }

    .album-section h2 {
      color: #fff;
      font-size: 1.3rem;
      text-shadow: 1px 2px 4px rgba(0,80,120,0.3);
      margin-bottom: 16px;
      text-align: center;
    }

    /* ページめくりコンテナ */
    .book-container {
      perspective: 1800px;
      width: 100%;
    }

    .book {
      position: relative;
      width: 100%;
      min-height: 300px;
    }

    /* 各ページ */
    .book-page {
      width: 100%;
      transform-origin: left center;
      transform-style: preserve-3d;
      transition: transform 0.7s cubic-bezier(0.645, 0.045, 0.355, 1.000);
      position: relative;
    }

    /* ページめくりアニメーション */
    .book-page.flip {
      transform: rotateY(-180deg);
    }

    .page-front, .page-back {
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .page-back {
      transform: rotateY(180deg);
      position: absolute;
      top: 0; left: 0; width: 100%;
    }

    /* スクラップブックページ本体 */
    .scrap-page {
      background: #fffef8;
      border-radius: 4px 16px 16px 4px;
      box-shadow:
        -5px 0 0 #c97e3a,
        0 4px 20px rgba(0,0,0,0.2),
        4px 4px 0 rgba(0,0,0,0.06);
      padding: 28px 24px 28px 32px;
      border-left: 8px solid #c97e3a;
      position: relative;
      overflow: hidden;
    }

    /* 背景に薄い方眼 */
    .scrap-page::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(160,210,235,0.25) 1px, transparent 1px),
        linear-gradient(90deg, rgba(160,210,235,0.25) 1px, transparent 1px);
      background-size: 24px 24px;
      pointer-events: none;
    }

    .scrap-page > * { position: relative; }

    /* ===== 日記カード（スクラップ風） ===== */
    .diary-card {
      background: #fffdf5;
      border-radius: 3px;
      padding: 16px;
      margin-bottom: 20px;
      position: relative;
      box-shadow: 2px 3px 10px rgba(0,0,0,0.12);
    }

    /* テープ風デコレーション */
    .diary-card::before {
      content: '';
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%) rotate(-2deg);
      width: 60px;
      height: 18px;
      background: rgba(255,200,80,0.55);
      border-radius: 2px;
    }

    .diary-card:nth-child(even)::before {
      left: 30%;
      transform: translateX(-50%) rotate(3deg);
      background: rgba(180,220,255,0.6);
    }

    .diary-card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 2px 8px;
      font-size: 13px;
      color: #888;
      margin-bottom: 10px;
      border-bottom: 1px dashed #ddd;
      padding-bottom: 8px;
    }

    .diary-card-date { font-weight: bold; color: #c97e3a; }

    .diary-card-name {
      font-size: 13px;
      font-weight: bold;
      color: #5a8fa8;
      grid-column: 1 / -1;  /* 日付・気分の下に独立して表示 */
    }

    .diary-card-text {
      font-size: 15px;
      line-height: 1.7;
      color: #333;
      white-space: pre-wrap;
      margin-bottom: 10px;
    }

    /* 写真グリッド */
    .diary-photos {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
      gap: 8px;
      margin-top: 10px;
    }

    .diary-photo-item {
      position: relative;
      aspect-ratio: 1;
      overflow: hidden;
      border-radius: 4px;
      border: 3px solid #fff;
      box-shadow: 1px 2px 6px rgba(0,0,0,0.2);
      cursor: pointer;
      transition: transform 0.15s;
    }

    .diary-photo-item:hover { transform: scale(1.04) rotate(1deg); }

    .diary-photo-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* 写真を少し傾けてスクラップっぽく */
    .diary-photos .diary-photo-item:nth-child(3n+1) { transform: rotate(-2deg); }
    .diary-photos .diary-photo-item:nth-child(3n+2) { transform: rotate(1.5deg); }
    .diary-photos .diary-photo-item:nth-child(3n+3) { transform: rotate(-1deg); }
    .diary-photos .diary-photo-item:nth-child(3n+1):hover { transform: rotate(-2deg) scale(1.05); }
    .diary-photos .diary-photo-item:nth-child(3n+2):hover { transform: rotate(1.5deg) scale(1.05); }
    .diary-photos .diary-photo-item:nth-child(3n+3):hover { transform: rotate(-1deg) scale(1.05); }

    .diary-delete-btn {
      position: absolute;
      right: 10px;
      bottom: 10px;
      padding: 5px 12px;
      background: #ef5350;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .diary-delete-btn:hover { background: #c62828; }

    /* ===== ナビゲーションボタン ===== */
    .page-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 16px;
    }

    .nav-btn {
      padding: 10px 22px;
      background: rgba(255,255,255,0.85);
      border: 2px solid #c97e3a;
      border-radius: 30px;
      font-size: 14px;
      font-weight: bold;
      color: #c97e3a;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }

    .nav-btn:hover { background: #fff3e0; transform: translateY(-1px); }
    .nav-btn:disabled { opacity: 0.35; cursor: default; transform: none; }

    .page-indicator {
      font-size: 13px;
      color: rgba(255,255,255,0.9);
      text-shadow: 1px 1px 3px rgba(0,0,0,0.2);
    }

    /* ===== 写真ライトボックス ===== */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .lightbox.open { display: flex; }

    .lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      border-radius: 6px;
      box-shadow: 0 0 40px rgba(0,0,0,0.6);
      object-fit: contain;
    }

    .lightbox-close {
      position: fixed;
      top: 20px;
      right: 24px;
      font-size: 36px;
      color: #fff;
      cursor: pointer;
      line-height: 1;
      text-shadow: 0 0 8px rgba(0,0,0,0.5);
    }

    .empty-msg {
      text-align: center;
      color: rgba(255,255,255,0.85);
      font-size: 15px;
      padding: 30px 0;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>

<!-- ===== 背景：青空＋ひまわり畑 SVGイラスト ===== -->
<svg id="bg-scene" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- 空のグラデーション -->
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3aa8d8"/>
      <stop offset="100%" stop-color="#a8dff5"/>
    </linearGradient>
    <!-- 草原グラデーション -->
    <linearGradient id="grassGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6abf3a"/>
      <stop offset="100%" stop-color="#4a9a1e"/>
    </linearGradient>
  </defs>

  <!-- 空 -->
  <rect width="1200" height="700" fill="url(#skyGrad)"/>

  <!-- 雲 1 -->
  <g opacity="0.92">
    <ellipse cx="160" cy="100" rx="80" ry="38" fill="#fff"/>
    <ellipse cx="110" cy="112" rx="52" ry="30" fill="#fff"/>
    <ellipse cx="215" cy="108" rx="55" ry="28" fill="#fff"/>
  </g>
  <!-- 雲 2 -->
  <g opacity="0.88">
    <ellipse cx="520" cy="70" rx="95" ry="40" fill="#fff"/>
    <ellipse cx="460" cy="84" rx="58" ry="30" fill="#fff"/>
    <ellipse cx="580" cy="80" rx="62" ry="28" fill="#fff"/>
  </g>
  <!-- 雲 3 -->
  <g opacity="0.85">
    <ellipse cx="950" cy="90" rx="85" ry="36" fill="#fff"/>
    <ellipse cx="900" cy="103" rx="55" ry="28" fill="#fff"/>
    <ellipse cx="1008" cy="100" rx="58" ry="26" fill="#fff"/>
  </g>
  <!-- 雲 4（小） -->
  <g opacity="0.7">
    <ellipse cx="760" cy="50" rx="55" ry="24" fill="#fff"/>
    <ellipse cx="720" cy="60" rx="36" ry="20" fill="#fff"/>
    <ellipse cx="800" cy="58" rx="38" ry="20" fill="#fff"/>
  </g>

  <!-- 草原 -->
  <ellipse cx="600" cy="580" rx="720" ry="160" fill="url(#grassGrad)"/>
  <rect x="0" y="560" width="1200" height="200" fill="#4a9a1e"/>

  <!-- ===== ひまわりを描くテンプレ（inline で複数配置） ===== -->
  <!-- ひまわり関数の代わりに <use> でシンボルを再利用 -->
  <defs>
    <!-- ひまわり1輪のシンボル（中心を0,0とした半径60px想定） -->
    <symbol id="sunflower" viewBox="-60 -120 120 140">
      <!-- 茎 -->
      <rect x="-6" y="0" width="12" height="90" rx="5" fill="#4a8c1c"/>
      <!-- 葉（左） -->
      <ellipse cx="-22" cy="40" rx="18" ry="10" fill="#5aab22" transform="rotate(-30 -22 40)"/>
      <!-- 葉（右） -->
      <ellipse cx="22" cy="60" rx="18" ry="10" fill="#5aab22" transform="rotate(30 22 60)"/>
      <!-- 花びら（8枚） -->
      <g fill="#f5c200">
        <ellipse cx="0"   cy="-68" rx="10" ry="20"/>
        <ellipse cx="0"   cy="-68" rx="10" ry="20" transform="rotate(45)"/>
        <ellipse cx="0"   cy="-68" rx="10" ry="20" transform="rotate(90)"/>
        <ellipse cx="0"   cy="-68" rx="10" ry="20" transform="rotate(135)"/>
        <ellipse cx="0"   cy="-68" rx="10" ry="20" transform="rotate(180)"/>
        <ellipse cx="0"   cy="-68" rx="10" ry="20" transform="rotate(225)"/>
        <ellipse cx="0"   cy="-68" rx="10" ry="20" transform="rotate(270)"/>
        <ellipse cx="0"   cy="-68" rx="10" ry="20" transform="rotate(315)"/>
      </g>
      <!-- 花芯（外） -->
      <circle cx="0" cy="-48" r="22" fill="#8B4513"/>
      <!-- 花芯（内） -->
      <circle cx="0" cy="-48" r="15" fill="#5c2e00"/>
      <!-- 花芯のドット模様 -->
      <circle cx="-6" cy="-52" r="3" fill="#7a3c00" opacity="0.6"/>
      <circle cx="6"  cy="-52" r="3" fill="#7a3c00" opacity="0.6"/>
      <circle cx="0"  cy="-44" r="3" fill="#7a3c00" opacity="0.6"/>
      <circle cx="-8" cy="-44" r="2.5" fill="#7a3c00" opacity="0.5"/>
      <circle cx="8"  cy="-44" r="2.5" fill="#7a3c00" opacity="0.5"/>
    </symbol>
  </defs>

  <!-- ひまわり配置（手前→奥の順） -->
  <!-- 奥の小さいひまわり群 -->
  <use href="#sunflower" x="80"  y="560" width="70"  height="82"/>
  <use href="#sunflower" x="200" y="550" width="65"  height="76"/>
  <use href="#sunflower" x="330" y="558" width="68"  height="80"/>
  <use href="#sunflower" x="460" y="545" width="62"  height="73"/>
  <use href="#sunflower" x="580" y="555" width="66"  height="77"/>
  <use href="#sunflower" x="700" y="548" width="64"  height="75"/>
  <use href="#sunflower" x="820" y="553" width="67"  height="79"/>
  <use href="#sunflower" x="950" y="546" width="63"  height="74"/>
  <use href="#sunflower" x="1070" y="557" width="66" height="78"/>

  <!-- 手前の大きいひまわり群 -->
  <use href="#sunflower" x="20"  y="615" width="90"  height="106"/>
  <use href="#sunflower" x="150" y="608" width="95"  height="112"/>
  <use href="#sunflower" x="285" y="618" width="88"  height="104"/>
  <use href="#sunflower" x="415" y="610" width="92"  height="108"/>
  <use href="#sunflower" x="545" y="620" width="86"  height="101"/>
  <use href="#sunflower" x="670" y="612" width="93"  height="110"/>
  <use href="#sunflower" x="800" y="616" width="89"  height="105"/>
  <use href="#sunflower" x="930" y="607" width="94"  height="111"/>
  <use href="#sunflower" x="1060" y="614" width="88" height="104"/>
  <use href="#sunflower" x="1160" y="620" width="84" height="99"/>

  <!-- 緑の草むら（前景） -->
  <ellipse cx="100"  cy="700" rx="130" ry="50" fill="#3d8c15" opacity="0.8"/>
  <ellipse cx="400"  cy="700" rx="180" ry="55" fill="#4a9a1e" opacity="0.7"/>
  <ellipse cx="750"  cy="700" rx="200" ry="52" fill="#3d8c15" opacity="0.8"/>
  <ellipse cx="1100" cy="700" rx="160" ry="50" fill="#4a9a1e" opacity="0.75"/>
</svg>

<h1 class="app-title">🌻 夏休み一言日記</h1>

<!-- 入力フォーム（ノート風） -->
<div class="form-book">
  <h2>✏️ 今日の思い出を書こう</h2>

  <div class="form-group">
    <label for="diary-name">👤 名前</label>
    <input type="text" id="diary-name" placeholder="だれが書くの？" maxlength="20">
  </div>

  <div class="form-group">
    <label for="diary-date">📅 日付</label>
    <input type="date" id="diary-date">
  </div>

  <div class="form-group">
    <label>今日の気分</label>
    <div class="mood-selector">
      <input type="radio" name="mood" id="mood1" value="😎 最高！" class="mood-box" checked>
      <label for="mood1" class="mood-label" title="最高！">😎</label>

      <input type="radio" name="mood" id="mood2" value="😃 楽しく過ごした" class="mood-box">
      <label for="mood2" class="mood-label" title="楽しく過ごした">😃</label>

      <input type="radio" name="mood" id="mood3" value="😴 のんびり" class="mood-box">
      <label for="mood3" class="mood-label" title="のんびり">😴</label>

      <input type="radio" name="mood" id="mood4" value="😢 びみょー" class="mood-box">
      <label for="mood4" class="mood-label" title="びみょー">😢</label>
    </div>
  </div>

  <div class="form-group">
    <label for="diary-text">今日の一言（140文字以内）</label>
    <textarea id="diary-text" rows="3" placeholder="今日あったことを書こう！" maxlength="140"></textarea>
  </div>

  <div class="form-group">
    <label>📷 写真を追加（複数OK）</label>
    <div class="photo-upload-area" id="upload-area">
      <input type="file" id="photo-input" accept="image/*" multiple>
      <div class="photo-upload-hint">📁 クリックまたはドラッグ＆ドロップで写真を選択</div>
    </div>
    <div class="photo-preview-wrap" id="photo-preview"></div>
  </div>

  <button class="save-btn" onclick="saveDiary()">日記を残す 📝</button>
</div>

<!-- アルバム（スクラップブック） -->
<div class="album-section">
  <h2>📖 これまでの思い出</h2>

  <div class="book-container">
    <div class="book" id="book">
      <!-- ページはJSで生成 -->
    </div>
  </div>

  <div class="page-nav">
    <button class="nav-btn" id="prev-btn" onclick="changePage(-1)" disabled>◀ 前のページ</button>
    <span class="page-indicator" id="page-indicator"></span>
    <button class="nav-btn" id="next-btn" onclick="changePage(1)">次のページ ▶</button>
  </div>
</div>

<!-- ライトボックス -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <span class="lightbox-close" onclick="closeLightbox()">✕</span>
  <img id="lightbox-img" src="" alt="写真">
</div>

<!-- Firebase SDK（CDN） -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
  import { getDatabase, ref, push, remove, onValue, query, orderByChild }
    from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";

  // ===== Firebase 設定 =====
  const firebaseConfig = {
    apiKey: "AIzaSyAGEv-sh80o1Dz0Z-rG3OKKJQMSS7xlU0A",
    authDomain: "natsu-diary.firebaseapp.com",
    databaseURL: "https://natsu-diary-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "natsu-diary",
    storageBucket: "natsu-diary.firebasestorage.app",
    messagingSenderId: "15092330432",
    appId: "1:15092330432:web:24472927c4fbc108422225"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);
  const diariesRef = ref(db, 'diaries');

  // ===== 状態 =====
  const ITEMS_PER_PAGE = 3;
  let currentPage = 0;
  let allDiaries   = []; // Firebaseから取得した全件（新しい順）
  let pendingPhotos = [];

  // ===== 初期化 =====
  document.getElementById('diary-date').valueAsDate = new Date();
  setupPhotoUpload();

  // Firebase をリアルタイム監視 → 変更があれば自動で画面更新
  const diariesQuery = query(diariesRef, orderByChild('createdAt'));
  onValue(diariesQuery, (snapshot) => {
    const data = snapshot.val();
    if (!data) {
      allDiaries = [];
    } else {
      // createdAt の降順（新しい順）に並べ直す
      allDiaries = Object.entries(data)
        .map(([fbKey, val]) => ({ fbKey, ...val }))
        .sort((a, b) => b.createdAt - a.createdAt);
    }
    currentPage = 0;
    renderPage();
  });

  // ===== 写真アップロード設定 =====
  function setupPhotoUpload() {
    const area  = document.getElementById('upload-area');
    const input = document.getElementById('photo-input');

    input.addEventListener('change', () => handleFiles(input.files));

    area.addEventListener('dragover', (e) => { e.preventDefault(); area.classList.add('drag-over'); });
    area.addEventListener('dragleave', () => area.classList.remove('drag-over'));
    area.addEventListener('drop', (e) => {
      e.preventDefault();
      area.classList.remove('drag-over');
      handleFiles(e.dataTransfer.files);
    });
  }

  function handleFiles(files) {
    Array.from(files).forEach(file => {
      if (!file.type.startsWith('image/')) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        compressImage(e.target.result, 800, 0.7, (compressed) => {
          pendingPhotos.push(compressed);
          renderPreview();
        });
      };
      reader.readAsDataURL(file);
    });
  }

  function compressImage(dataUrl, maxSize, quality, callback) {
    const img = new Image();
    img.onload = () => {
      let w = img.width, h = img.height;
      if (w > maxSize || h > maxSize) {
        if (w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
        else       { w = Math.round(w * maxSize / h); h = maxSize; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      callback(canvas.toDataURL('image/jpeg', quality));
    };
    img.src = dataUrl;
  }

  function renderPreview() {
    const wrap = document.getElementById('photo-preview');
    wrap.innerHTML = '';
    pendingPhotos.forEach((src, i) => {
      const wrapItem = document.createElement('div');
      wrapItem.className = 'photo-thumb-wrap';
      wrapItem.style.cssText = 'position:relative;display:inline-block;';

      const img = document.createElement('img');
      img.src = src;
      img.style.cssText = 'width:72px;height:72px;object-fit:cover;border-radius:6px;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.2);';

      const removeBtn = document.createElement('button');
      removeBtn.className = 'photo-remove-btn';
      removeBtn.textContent = '✕';
      removeBtn.onclick = () => { pendingPhotos.splice(i, 1); renderPreview(); };

      wrapItem.appendChild(img);
      wrapItem.appendChild(removeBtn);
      wrap.appendChild(wrapItem);
    });
  }

  // ===== 日記を保存する（Firebaseへ push）=====
  window.saveDiary = async function () {
    const name = document.getElementById('diary-name').value.trim();
    const date = document.getElementById('diary-date').value;
    const text = document.getElementById('diary-text').value.trim();
    const mood = document.querySelector('input[name="mood"]:checked').value;

    if (!name) { alert('名前を入力してね！'); return; }
    if (!text) { alert('日記の内容を入力してね！'); return; }

    const saveBtn = document.querySelector('.save-btn');
    saveBtn.disabled = true;
    saveBtn.textContent = '保存中…';

    const entry = {
      createdAt: Date.now(),
      name, date, mood, text,
      photos: JSON.stringify(pendingPhotos) // 配列は文字列化して保存
    };

    try {
      await push(diariesRef, entry);
      // リセット
      document.getElementById('diary-name').value = '';
      document.getElementById('diary-text').value = '';
      document.getElementById('diary-date').valueAsDate = new Date();
      document.getElementById('photo-preview').innerHTML = '';
      document.getElementById('photo-input').value = '';
      pendingPhotos = [];
      document.getElementById('mood1').checked = true;
    } catch (e) {
      alert('保存に失敗しました。通信状況を確認してね。\n' + e.message);
    } finally {
      saveBtn.disabled = false;
      saveBtn.textContent = '日記を残す 📝';
    }
  };

  // ===== ページ描画 =====
  function renderPage() {
    const book = document.getElementById('book');
    book.innerHTML = '';

    if (allDiaries.length === 0) {
      book.innerHTML = '<p class="empty-msg">まだ日記がありません。最初の思い出を書こう！🌈</p>';
      document.getElementById('page-indicator').textContent = '';
      document.getElementById('prev-btn').disabled = true;
      document.getElementById('next-btn').disabled = true;
      return;
    }

    const totalPages = Math.ceil(allDiaries.length / ITEMS_PER_PAGE);
    if (currentPage >= totalPages) currentPage = totalPages - 1;

    const pageDiaries = allDiaries.slice(currentPage * ITEMS_PER_PAGE, (currentPage + 1) * ITEMS_PER_PAGE);

    const pageEl = document.createElement('div');
    pageEl.className = 'book-page';
    const front = document.createElement('div');
    front.className = 'page-front';
    const scrap = document.createElement('div');
    scrap.className = 'scrap-page';

    pageDiaries.forEach(diary => scrap.appendChild(buildCard(diary)));

    front.appendChild(scrap);
    pageEl.appendChild(front);
    book.appendChild(pageEl);

    document.getElementById('prev-btn').disabled = (currentPage === 0);
    document.getElementById('next-btn').disabled = (currentPage >= totalPages - 1);
    document.getElementById('page-indicator').textContent = `${currentPage + 1} / ${totalPages} ページ`;
  }

  // ===== カードを組み立てる =====
  function buildCard(diary) {
    const photos = JSON.parse(diary.photos || '[]');
    const card = document.createElement('div');
    card.className = 'diary-card';

    const nameHtml = diary.name ? `<span class="diary-card-name">✏️ ${diary.name}</span>` : '';
    const meta = document.createElement('div');
    meta.className = 'diary-card-meta';
    meta.innerHTML = `
      <span class="diary-card-date">📅 ${diary.date}</span>
      <span>${diary.mood}</span>
      ${nameHtml}
    `;

    const textEl = document.createElement('div');
    textEl.className = 'diary-card-text';
    textEl.textContent = diary.text;

    card.appendChild(meta);
    card.appendChild(textEl);

    if (photos.length > 0) {
      const grid = document.createElement('div');
      grid.className = 'diary-photos';
      photos.forEach(src => {
        const item = document.createElement('div');
        item.className = 'diary-photo-item';
        const img = document.createElement('img');
        img.src = src;
        img.alt = '思い出の写真';
        img.onclick = () => openLightbox(src);
        item.appendChild(img);
        grid.appendChild(item);
      });
      card.appendChild(grid);
    }

    const delBtn = document.createElement('button');
    delBtn.className = 'diary-delete-btn';
    delBtn.textContent = '消す';
    delBtn.onclick = () => deleteDiary(diary.fbKey);
    card.appendChild(delBtn);

    return card;
  }

  // ===== ページめくり =====
  window.changePage = function (dir) {
    const totalPages = Math.ceil(allDiaries.length / ITEMS_PER_PAGE);
    const newPage = currentPage + dir;
    if (newPage < 0 || newPage >= totalPages) return;

    const book = document.getElementById('book');
    const pageEl = book.querySelector('.book-page');
    if (!pageEl) return;

    if (dir > 0) {
      pageEl.style.cssText = 'transition:transform 0.5s,opacity 0.5s;transform-origin:left center;transform:perspective(1200px) rotateY(-12deg) translateX(-4%);opacity:0.3;';
    } else {
      pageEl.style.cssText = 'transition:transform 0.5s,opacity 0.5s;transform-origin:right center;transform:perspective(1200px) rotateY(12deg) translateX(4%);opacity:0.3;';
    }

    setTimeout(() => {
      currentPage = newPage;
      renderPage();
      const newEl = book.querySelector('.book-page');
      if (!newEl) return;
      newEl.style.transition = 'none';
      newEl.style.transform = dir > 0
        ? 'perspective(1200px) rotateY(12deg) translateX(4%)'
        : 'perspective(1200px) rotateY(-12deg) translateX(-4%)';
      newEl.style.opacity = '0.3';
      requestAnimationFrame(() => requestAnimationFrame(() => {
        newEl.style.transition = 'transform 0.4s ease, opacity 0.4s ease';
        newEl.style.transform  = 'perspective(1200px) rotateY(0deg) translateX(0)';
        newEl.style.opacity    = '1';
      }));
    }, 480);
  };

  // ===== 日記削除 =====
  window.deleteDiary = async function (fbKey) {
    if (!confirm('この日の思い出を消してもいいですか？')) return;
    try {
      await remove(ref(db, `diaries/${fbKey}`));
    } catch (e) {
      alert('削除に失敗しました。\n' + e.message);
    }
  };

  // ===== ライトボックス =====
  window.openLightbox = function (src) {
    document.getElementById('lightbox-img').src = src;
    document.getElementById('lightbox').classList.add('open');
  };
  window.closeLightbox = function () {
    document.getElementById('lightbox').classList.remove('open');
    document.getElementById('lightbox-img').src = '';
  };
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeLightbox(); });
</script>
</body>
</html>
